name: Agentic OS Integration

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '41 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-and-evaluation:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          path: xox-model
      - uses: actions/checkout@v4
        with:
          repository: Suysker/agentic-os
          path: agentic-os
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: agentic-os
      - run: npm run build
        working-directory: agentic-os
      - run: npm ci
        working-directory: xox-model
      - run: npm run build:api
        working-directory: xox-model
      - run: npm run test:api
        working-directory: xox-model
